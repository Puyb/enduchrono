name: CI PR

on:
  pull_request:
  push:
    branches: [main]

jobs:
  classements-ui-fast:
    name: classements-ui - lint + unitaires + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint + tests unitaires + tests d'integration
        run: docker compose --profile dev run --rm classements-ui-test
      - name: Arreter la stack
        if: always()
        run: docker compose --profile dev down -v

  classements-ui-e2e-smoke:
    name: classements-ui - E2E smoke
    needs: classements-ui-fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: E2E smoke (parcours critiques P0)
        run: docker compose --profile dev run --rm classements-ui-e2e-smoke
      - name: Publier le rapport Playwright (en cas d'echec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: classements-ui-e2e-smoke-report
          path: |
            classements/ui/playwright-report
            classements/ui/test-results
          retention-days: 7
      - name: Arreter la stack
        if: always()
        run: docker compose --profile dev down -v
