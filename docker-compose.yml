version: '3'
services:
  classements:
    build:
      context: ./classements
    volumes:
      - ./classements/data:/app/data
    environment:
      - CHRONO_HOST=chrono
      - CHRONO_PORT=3000
      - WEB_HOST=web
      - WEB_PORT=3000
      - WEB_TOKEN=${WEB_TOKEN:-token}
    ports:
      - 3000:3000
    profiles:
      - prod

  chrono:
    build:
      context: ./chrono
    volumes:
      - ./chrono/data:/app/data
    environment:
      - CHRONO_ADDRESS=${CHRONO_ADDRESS:-chrono}
      - CHRONELEC_ADDRESS=${CHRONELEC_ADDRESS:-sim}
    ports:
      - 3001:3000
      - 2008:2008/udp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 1s
      retries: 15
    profiles:
      - prod
    
  sim:
    build:
      context: ./sim
    environment:
      - CHRONO_ADDRESS=chrono
      - SIMULATOR_ADDRESS=sim
    ports:
      - 3002:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/status').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 1s
      retries: 15
    profiles:
      - prod

  web:
    build:
      context: ./web
    volumes:
      - ./web/data:/app/data
    environment:
      - CLASSEMENTS_HOST=${CLASSEMENTS_HOST:-classements}
    ports:
      - 3003:3000
    profiles:
      - prod

  classements-dev:
    image: node:23
    volumes:
      - ./classements:/app
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - CHRONO_HOST=chrono-dev
      - CHRONO_PORT=3000
      - WEB_HOST=web-dev
      - WEB_PORT=3000
      - WEB_TOKEN=${WEB_TOKEN:-token}
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/equipes').then(r=>{if(r.status>=500)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 20s
    profiles:
      - dev

  classements-test:
    image: node:23
    volumes:
      - ./classements:/app
    working_dir: /app
    command: bash -c "npm install && npm run test"
    profiles:
      - dev

  chrono-dev:
    image: node:23
    volumes:
      - ./chrono:/app
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - CHRONO_ADDRESS=${CHRONO_ADDRESS:-chrono-dev}
      - CHRONELEC_ADDRESS=${CHRONELEC_ADDRESS:-sim-dev}
    ports:
      - 3001:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 20s
    profiles:
      - dev

  chrono-test:
    image: node:23
    volumes:
      - ./chrono:/app
    working_dir: /app
    command: bash -c "npm install && npm test"
    environment:
      - CHRONO_URL=http://chrono:3000
      - SIM_URL=http://sim:3000
    depends_on:
      chrono-dev:
        condition: service_started
      sim-dev:
        condition: service_started
    profiles:
      - dev
    
  sim-dev:
    image: node:23
    volumes:
      - ./sim:/app
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - CHRONO_ADDRESS=chrono-dev
      - SIMULATOR_ADDRESS=sim-dev
    ports:
      - 3002:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/status').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 20s
    profiles:
      - dev

  web-dev:
    image: node:23
    volumes:
      - ./web:/app
    working_dir: /app
    command: bash -c "npm install && npm run dev"
    environment:
      - CLASSEMENTS_HOST=${CLASSEMENTS_HOST:-classements-dev}
    ports:
      - 3003:3000
    profiles:
      - dev

  classements-ui:
    image: node:23
    volumes:
      - ./classements/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run serve -- --host 0.0.0.0 --disable-host-check"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - VUE_APP_API_BASE_URL=http://classements-dev:3000
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 90
      start_period: 20s
    profiles:
      - dev

  classements-ui-test:
    image: node:23
    volumes:
      - ./classements/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run test:unit && npm run test:integration"
    profiles:
      - dev

  classements-ui-e2e-smoke:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    volumes:
      - ./classements/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run test:e2e:smoke"
    environment:
      - CLASSEMENTS_API_URL=http://classements-dev:3000
      - CLASSEMENTS_UI_URL=http://classements-ui:8080
    shm_size: 1gb
    depends_on:
      classements-dev:
        condition: service_healthy
      classements-ui:
        condition: service_healthy
      chrono-dev:
        condition: service_healthy
      sim-dev:
        condition: service_healthy
    profiles:
      - dev

  classements-ui-e2e-core:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    volumes:
      - ./classements/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run test:e2e:core"
    environment:
      - CLASSEMENTS_API_URL=http://classements-dev:3000
      - CLASSEMENTS_UI_URL=http://classements-ui:8080
    shm_size: 1gb
    depends_on:
      classements-dev:
        condition: service_healthy
      classements-ui:
        condition: service_healthy
      chrono-dev:
        condition: service_healthy
      sim-dev:
        condition: service_healthy
    profiles:
      - dev

  classements-ui-e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    volumes:
      - ./classements/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run test:e2e"
    environment:
      - CLASSEMENTS_API_URL=http://classements-dev:3000
      - CLASSEMENTS_UI_URL=http://classements-ui:8080
    shm_size: 1gb
    depends_on:
      classements-dev:
        condition: service_healthy
      classements-ui:
        condition: service_healthy
      chrono-dev:
        condition: service_healthy
      sim-dev:
        condition: service_healthy
    profiles:
      - dev

  sim-ui:
    image: node:23
    volumes:
      - ./sim/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run serve"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    ports:
      - 8081:8080
    profiles:
      - dev

  web-ui:
    image: node:23
    volumes:
      - ./web/ui:/app
    working_dir: /app
    command: bash -c "npm install && npm run serve"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    ports:
      - 8082:8080
    profiles:
      - dev
